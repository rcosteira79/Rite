</button>

<main class="max-w-2xl mx-auto px-6 pt-8 space-y-12">

<section class="flex flex-col items-start pl-4 pr-4">
<span class="font-headline font-extrabold text-primary tracking-tighter text-4xl mb-2">HabitLock</span>
<p class="text-secondary font-label text-xs uppercase tracking-[0.2em] opacity-80">Architectural Discipline</p>

<!-- Configuration Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Strictness Selection -->
<div class="bg-surface-container-low border border-outline-variant/20 rounded-[2rem] p-6 flex flex-col justify-between aspect-square md:aspect-auto">
<div>
<h3 class="font-headline font-bold text-on-surface text-xl mb-1">Strictness</h3>
<p class="text-on-surface-variant text-sm mb-6">Define your boundary integrity.</p>
</div>
<div class="space-y-2">
<button class="w-full flex justify-between items-center p-4 bg-primary text-on-primary rounded-2xl transition-all shadow-lg shadow-primary/10">
<span class="font-bold tracking-tight">Flexible</span>
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<button class="w-full flex justify-between items-center p-4 bg-surface-container-high hover:bg-surface-container-highest text-on-surface rounded-2xl transition-all border border-outline-variant/10">
<span class="font-medium">Balanced</span>
</button>
<button class="w-full flex justify-between items-center p-4 bg-surface-container-high hover:bg-surface-container-highest text-on-surface rounded-2xl transition-all border border-outline-variant/10">
<span class="font-medium">Locked</span>
</button>
</div>

<span class="material-symbols-outlined" data-icon="notifications_active">notifications_active</span>
</div>
<div>
<p class="font-bold text-on-surface">Notifications</p>

</div>

<div class="w-1.5 h-1.5 bg-primary rounded-full"></div>
</div>

</div>

<button class="flex-1 py-4 px-2 bg-surface-container-high rounded-2xl flex flex-col items-center gap-2 border border-outline-variant/10 hover:bg-surface-container-highest transition-colors">

<span class="text-[10px] font-bold uppercase tracking-widest opacity-60">Light</span>

<button class="flex-1 py-4 px-2 bg-primary/10 rounded-2xl flex flex-col items-center gap-2 border-2 border-primary">
<span class="material-symbols-outlined text-primary" data-icon="dark_mode" style="font-variation-settings: 'FILL' 1;">dark_mode</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-primary">Dark</span>
</button>
<button class="flex-1 py-4 px-2 bg-surface-container-high rounded-2xl flex flex-col items-center gap-2 border border-outline-variant/10 hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-secondary" data-icon="settings_brightness">settings_brightness</span>
<span class="text-[10px] font-bold uppercase tracking-widest opacity-60">Auto</span>
</button>
</div>
</div>
</div>

<button class="w-full px-8 py-6 flex items-center justify-between hover:bg-surface-container-high transition-colors text-left group">
<div class="flex items-center gap-5">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="lock_reset">lock_reset</span>
</div>
<span class="font-semibold text-on-surface tracking-tight">Privacy &amp; Encryption</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>

<div class="mx-8 h-px bg-outline-variant opacity-10"></div>

<span class="material-symbols-outlined" data-icon="cloud_sync">cloud_sync</span>

</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>

<span class="material-symbols-outlined" data-icon="delete_forever">delete_forever</span>

</div>
<span class="material-symbols-outlined text-error opacity-40" data-icon="chevron_right">chevron_right</span>
</button>
