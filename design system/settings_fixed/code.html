<button class="text-[#163829] dark:text-[#A9CFBA] hover:bg-[#E5E2DF]/50 transition-colors p-2 rounded-full active:scale-95 duration-200">

</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-[#163829] dark:text-[#A9CFBA]">Settings</h1>

<div class="h-10 w-10 rounded-full overflow-hidden border-2 border-primary-fixed-dim">

<main class="max-w-2xl mx-auto px-6 pt-8 space-y-12">

<section class="flex flex-col items-start pl-8 pr-4">
<span class="font-headline font-extrabold text-[#163829] tracking-tighter text-4xl mb-2">HabitLock</span>
<p class="text-secondary font-label text-sm uppercase tracking-widest">Architectural Discipline</p>

<!-- Configuration Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Strictness Selection -->
<div class="bg-surface-container-low rounded-xl p-6 flex flex-col justify-between aspect-square md:aspect-auto">
<div>
<h3 class="font-headline font-bold text-primary text-xl mb-1">Strictness</h3>
<p class="text-on-surface-variant font-body text-sm mb-6">Define your boundary integrity.</p>
</div>
<div class="space-y-3 font-body">
<button class="w-full flex justify-between items-center p-4 bg-surface-container-highest rounded-lg border-2 border-primary transition-all">
<span class="font-medium">Flexible</span>
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<button class="w-full flex justify-between items-center p-4 bg-surface hover:bg-surface-container-high rounded-lg transition-all">
<span class="font-medium">Balanced</span>
</button>
<button class="w-full flex justify-between items-center p-4 bg-surface hover:bg-surface-container-high rounded-lg transition-all">
<span class="font-medium">Locked</span>
</button>
</div>
</div>

<div class="flex items-center gap-4">
<div class="bg-secondary-container p-3 rounded-lg text-on-secondary-container">
<span class="material-symbols-outlined" data-icon="notifications_active">notifications_active</span>
</div>
<div>
<p class="font-bold text-primary">Notifications</p>
<p class="text-xs text-on-surface-variant">Gentle awareness cues</p>
</div>
</div>

<button class="w-12 h-6 bg-primary-container rounded-full relative transition-colors duration-300">
<div class="absolute right-1 top-1 w-4 h-4 bg-on-primary rounded-full shadow-sm"></div>
</button>
</div>
<!-- Theme Selection -->
<div class="bg-surface-container-low rounded-xl p-6">
<h3 class="font-headline font-bold text-primary text-lg mb-4">Visual Theme</h3>
<div class="flex gap-2">
<button class="flex-1 py-3 px-2 bg-surface rounded-lg flex flex-col items-center gap-2 border-2 border-primary-fixed-dim">
<span class="material-symbols-outlined text-primary" data-icon="light_mode">light_mode</span>
<span class="text-[10px] font-label font-bold uppercase tracking-tighter">Light</span>
</button>
<button class="flex-1 py-3 px-2 bg-surface-container-highest rounded-lg flex flex-col items-center gap-2 hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-secondary" data-icon="dark_mode">dark_mode</span>
<span class="text-[10px] font-label font-bold uppercase tracking-tighter">Dark</span>
</button>
<button class="flex-1 py-3 px-2 bg-surface-container-highest rounded-lg flex flex-col items-center gap-2 hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-secondary" data-icon="settings_brightness">settings_brightness</span>
<span class="text-[10px] font-label font-bold uppercase tracking-tighter">Auto</span>
</button>
</div>
</div>
</div>
</div>
<!-- Account Settings List -->
<section class="space-y-4 pb-12">
<h2 class="font-headline font-bold text-primary text-2xl pl-2">Security &amp; Data</h2>
<div class="bg-surface-container-low rounded-[1.5rem] overflow-hidden font-body">
<button class="w-full px-8 py-5 flex items-center justify-between hover:bg-surface-container-high transition-colors text-left group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-secondary" data-icon="lock_reset">lock_reset</span>
<span class="font-medium text-on-surface">Privacy &amp; Encryption</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<div class="mx-8 h-px bg-surface-variant opacity-30"></div>
<button class="w-full px-8 py-5 flex items-center justify-between hover:bg-surface-container-high transition-colors text-left group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-secondary" data-icon="cloud_sync">cloud_sync</span>
<span class="font-medium text-on-surface">Data Synchronization</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<div class="mx-8 h-px bg-surface-variant opacity-30"></div>
<button class="w-full px-8 py-5 flex items-center justify-between hover:bg-surface-container-high transition-colors text-left group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-error" data-icon="delete_forever">delete_forever</span>

</div>

<span class="material-symbols-outlined" data-icon="history">history</span>

<span class="material-symbols-outlined" data-icon="settings" style="font-variation-settings: 'FILL' 1;">settings</span>
