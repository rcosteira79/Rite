name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

jobs:
  test:
    name: Compile & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run tests
        run: ./gradlew :composeApp:testDebugUnitTest :composeApp:jvmTest --no-build-cache -Proborazzi.test.compare=false

  ios-build:
    name: iOS Build
    runs-on: macos-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Link Kotlin framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64
      - name: Build Xcode project
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

  android-artifact:
    name: Android Artifact
    runs-on: ubuntu-latest
    needs: test
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Get short SHA
        id: slug
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Build RC APK
        if: github.ref == 'refs/heads/develop'
        run: ./gradlew :composeApp:assembleRc
      - name: Build Release APK
        if: github.ref == 'refs/heads/master'
        run: ./gradlew :composeApp:assembleRelease
      - name: Upload RC artifact
        if: github.ref == 'refs/heads/develop'
        uses: actions/upload-artifact@v4
        with:
          name: habitlock-rc-${{ steps.slug.outputs.sha }}
          path: composeApp/build/outputs/apk/rc/**/*.apk
          if-no-files-found: error
      - name: Upload Release artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: habitlock-release-${{ steps.slug.outputs.sha }}
          path: composeApp/build/outputs/apk/release/**/*.apk
          if-no-files-found: error
