name: CI

on:
  push:
    branches: [master, develop]
    tags: ['v*']
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

jobs:
  test:
    name: Compile & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify snapshot files exist
        run: ls -la composeApp/src/androidUnitTest/snapshots/images/ | wc -l
      - name: Run tests
        run: ./gradlew :composeApp:testDebugUnitTest :composeApp:jvmTest --no-build-cache --no-configuration-cache

  ios-build:
    name: iOS Build
    runs-on: macos-latest
    needs: test
    if: false # Disabled to conserve GitHub Actions minutes (macOS = 10x multiplier)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Link Kotlin framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64
      - name: Build Xcode project
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

  android-artifact:
    name: Android Artifact
    runs-on: ubuntu-latest
    needs: test
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Get short SHA
        id: slug
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Build RC APK
        if: github.ref == 'refs/heads/develop'
        run: ./gradlew :composeApp:assembleRc
      - name: Build Release APK
        if: github.ref == 'refs/heads/master'
        env:
          RITE_STORE_FILE: ${{ runner.temp }}/rite-release.keystore
          RITE_KEY_ALIAS: ${{ secrets.RITE_KEY_ALIAS }}
          RITE_STORE_PASSWORD: ${{ secrets.RITE_STORE_PASSWORD }}
          RITE_KEY_PASSWORD: ${{ secrets.RITE_KEY_PASSWORD }}
        run: |
          echo "${{ secrets.RITE_KEYSTORE_BASE64 }}" | base64 --decode > "$RITE_STORE_FILE"
          ./gradlew :composeApp:assembleRelease --no-configuration-cache
      - name: Upload RC artifact
        if: github.ref == 'refs/heads/develop'
        uses: actions/upload-artifact@v4
        with:
          name: rite-rc-${{ steps.slug.outputs.sha }}
          path: composeApp/build/outputs/apk/rc/**/*.apk
          if-no-files-found: error
      - name: Upload Release artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: rite-release-${{ steps.slug.outputs.sha }}
          path: composeApp/build/outputs/apk/release/**/*.apk
          if-no-files-found: error

  release:
    name: Publish Release APK
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Decode keystore
        run: echo "${{ secrets.RITE_KEYSTORE_BASE64 }}" | base64 --decode > "${{ runner.temp }}/rite-release.keystore"
      - name: Build signed APK
        env:
          RITE_STORE_FILE: ${{ runner.temp }}/rite-release.keystore
          RITE_KEY_ALIAS: ${{ secrets.RITE_KEY_ALIAS }}
          RITE_STORE_PASSWORD: ${{ secrets.RITE_STORE_PASSWORD }}
          RITE_KEY_PASSWORD: ${{ secrets.RITE_KEY_PASSWORD }}
        run: ./gradlew :composeApp:assembleRelease --no-configuration-cache
      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Attach APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv composeApp/build/outputs/apk/release/composeApp-release.apk "rite-${{ steps.version.outputs.tag }}.apk"
          gh release upload "${{ steps.version.outputs.tag }}" "rite-${{ steps.version.outputs.tag }}.apk"
